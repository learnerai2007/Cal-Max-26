
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
    <title>OmniCalc Pro | Modern Intelligence</title>
    <meta name="description" content="Next-generation computation platform for finance, health, and science." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              accent: 'var(--accent-color)',
              brand: {
                50: '#f8fafc',
                100: '#f1f5f9',
                200: '#e2e8f0',
                300: '#cbd5e1',
                400: '#94a3b8',
                500: 'var(--accent-color)',
                600: 'var(--accent-color-dark)',
                700: '#4338ca',
                800: '#3730a3',
                900: '#312e81',
              },
              dark: {
                bg: 'var(--bg-primary)',
                surface: 'var(--bg-secondary)',
                border: 'var(--border-color)'
              }
            },
            borderRadius: {
              'xl': '1rem',
              '2xl': '1.5rem',
              '3xl': '2rem',
            },
            animation: {
              'fade-up': 'fade-up 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards',
              'blur-in': 'blur-in 0.4s ease-out forwards',
              'float': 'float 6s ease-in-out infinite',
              'shimmer': 'shimmer 2s linear infinite',
              'pulse-subtle': 'pulse-subtle 4s ease-in-out infinite',
              'mesh': 'mesh-movement 20s ease infinite',
            },
            keyframes: {
              'fade-up': {
                '0%': { opacity: '0', transform: 'translateY(20px) scale(0.98)' },
                '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
              },
              'shimmer': {
                '0%': { backgroundPosition: '-200% 0' },
                '100%': { backgroundPosition: '200% 0' },
              },
              'mesh-movement': {
                '0%, 100%': { transform: 'translate(0, 0) rotate(0deg)' },
                '33%': { transform: 'translate(5%, 5%) rotate(2deg)' },
                '66%': { transform: 'translate(-5%, 2%) rotate(-1deg)' },
              },
              'pulse-subtle': {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0.7' },
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --safe-top: env(safe-area-inset-top);
        --safe-bottom: env(safe-area-inset-bottom);
        --accent-color: #6366f1;
        --accent-color-dark: #4f46e5;
        --accent-glow: rgba(99, 102, 241, 0.12);
        --bg-primary: #020617;
        --bg-secondary: #0f172a;
        --border-color: rgba(255, 255, 255, 0.06);
        --glass-blur: 24px;
        --glass-bg: rgba(255, 255, 255, 0.02);
      }
      
      body { 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        -webkit-font-smoothing: antialiased;
        background-color: var(--bg-primary);
        color: #f8fafc;
        overflow-x: hidden;
      }
      
      .mono { font-family: 'JetBrains Mono', monospace; }
      
      .bg-mesh {
        position: fixed;
        inset: -50%;
        z-index: -1;
        background: radial-gradient(circle at 30% 30%, var(--accent-glow) 0%, transparent 50%),
                    radial-gradient(circle at 70% 70%, rgba(244, 63, 94, 0.04) 0%, transparent 50%),
                    radial-gradient(circle at 10% 90%, rgba(16, 185, 129, 0.03) 0%, transparent 40%);
        filter: blur(100px);
        animation: mesh-movement 30s ease-in-out infinite alternate;
      }

      .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(var(--glass-blur));
        border: 1px solid var(--border-color);
        transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .glass:hover {
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(255, 255, 255, 0.12);
      }

      .shimmer-text {
        background: linear-gradient(90deg, #94a3b8 0%, #f8fafc 50%, #94a3b8 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shimmer 3s linear infinite;
      }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 20px;
        height: 20px;
        background: var(--accent-color);
        border-radius: 50%;
        cursor: pointer;
        border: 3px solid #0f172a;
        box-shadow: 0 0 15px var(--accent-glow);
        transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom": "https://esm.sh/react-dom@^19.2.4",
        "react-dom/client": "https://esm.sh/react-dom@^19.2.4/client",
        "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
        "recharts": "https://esm.sh/recharts@^3.7.0",
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react/": "https://esm.sh/react@^19.2.4/"
      }
    }
    </script>
  </head>
  <body class="selection:bg-indigo-500/30 selection:text-white">
    <div class="bg-mesh"></div>
    <div id="root"></div>
  </body>
</html>
